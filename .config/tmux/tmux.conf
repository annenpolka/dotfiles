source-file /Users/annenpolka/.config/nvim/tmux/nvim-integration.conf

# macOS environment for tmux server/plugin processes.
# Keep fixed editor/PATH here instead of relying on ~/.zshrc or attach-time
# update-environment; tmux plugins such as extrakto run from the tmux server.
set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/Applications/Ghostty.app/Contents/MacOS"
set-environment -g EDITOR "nvim"
set-environment -g VISUAL "nvim"

# Core ergonomics.
unbind-key C-b
unbind-key -n C-a
set -g prefix None
set -s extended-keys always
set -s extended-keys-format csi-u
bind-key -n C-s if-shell "/opt/homebrew/bin/macism com.apple.keylayout.UnicodeHexInput >/dev/null 2>&1; true" "switch-client -T prefix; refresh-client -S"
bind-key C-s send-keys C-s
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g repeat-time 800
set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -s copy-command "pbcopy"
setw -g mode-keys vi

# Direct copy-mode entry.
bind-key -n C-[ copy-mode
set-hook -g pane-mode-changed 'if -F "#{==:#{pane_mode},copy-mode}" "run-shell -b \"/opt/homebrew/bin/macism com.apple.keylayout.UnicodeHexInput >/dev/null 2>&1 || true\""'

# Lightweight fzf switchers.
bind-key o display-popup -w 75% -h 75% -E "/Users/annenpolka/dotfiles/.config/tmux/scripts/fzf-switch sessions"
bind-key O display-popup -w 85% -h 80% -E "/Users/annenpolka/dotfiles/.config/tmux/scripts/fzf-switch windows"
bind-key e run-shell "\"/Users/annenpolka/.config/tmux/plugins/extrakto/scripts/open.sh\" \"#{pane_id}\""
bind-key -n C-] run-shell "\"/Users/annenpolka/.config/tmux/plugins/extrakto/scripts/open.sh\" \"#{pane_id}\""

# Pane resizing: prefix + Vim-style uppercase directions, then repeat.
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Appearance: quiet Tokyo Night style for Ghostty + Neovim.
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#{?#{==:#{client_key_table},prefix},#[bg=#e0af68]#[fg=#1a1b26]#[bold] PREFIX #[bg=#1a1b26]#[fg=#565f89]│,#[fg=#7aa2f7]#[bold] #S #[fg=#565f89]│}"
set -g status-right "#[fg=#565f89]#{pane_current_command} #[fg=#9ece6a]#{b:pane_current_path} #[fg=#565f89]│ #[fg=#e0af68]%H:%M "

set -g window-status-separator ""
set -g window-status-format "#[fg=#565f89] #I:#W "
set -g window-status-current-format "#[bg=#7aa2f7,fg=#1a1b26,bold] #I:#W "

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g display-panes-colour "#7aa2f7"
set -g display-panes-active-colour "#9ece6a"
set -g message-style "bg=#24283b,fg=#c0caf5"

# Plugins.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "/Users/annenpolka/.config/tmux/plugins/"
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "laktak/extrakto"
set -g @plugin "tmux-plugins/tmux-resurrect"

set -g @override_copy_command "pbcopy"

set -g @extrakto_grab_area "window 5000"
set -g @extrakto_filter_order "all path url line word"
set -g @extrakto_clip_tool "pbcopy"
set -g @extrakto_editor "nvim"
set -g @extrakto_fzf_tool "fzf"
set -g @resurrect-save "S"

run "/Users/annenpolka/.config/tmux/plugins/tpm/tpm"
