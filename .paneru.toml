# Paneru configuration
# Docs: https://github.com/karinushka/paneru/blob/main/CONFIGURATION.md

[options]
focus_follows_mouse = true
mouse_follows_focus = true
preset_column_widths = [0.25, 0.33, 0.5, 0.66, 0.75]
animation_speed = 50.0
auto_center = false
sliver_height = 1.0
sliver_width = 5
window_hidden_ratio = 0.0

[padding]
uop = 0
bottom = 0
left = 0
right = 0

[swipe]
sensitivity = 0.35
deceleration = 4.0
continuous = true

[swipe.scroll]
modifier = "alt"
vertical_modifier = "shift"

# Enable this later if it does not conflict with macOS trackpad gestures.
[swipe.gesture]
fingers_count = 4
direction = "Natural"

[decorations.inactive.dim]
opacity = -0.05
opacity_night = 0

[decorations.active.border]
enabled = true
color = "#89b4fa"
opacity = 0.9
width = 2.0
radius = "auto"

[bindings]
window_focus_west = "alt - h"
window_focus_south = "alt - j"
window_focus_north = "alt - k"
window_focus_east = "alt - l"
window_focus_first = "cmd + alt - h"
window_focus_last = "cmd + alt - l"

window_swap_west = "alt + shift - h"
window_swap_south = "alt + shift - j"
window_swap_north = "alt + shift - k"
window_swap_east = "alt + shift - l"

window_center = "alt - c"
window_resize = "alt - r"
window_shrink = "alt + shift - r"
window_fullwidth = "alt - f"
window_manage = "alt - m"
window_stack = "alt - s"
window_unstack = "alt + shift - s"
window_equalize = "alt - e"
window_nextdisplay = "alt - n"
window_nextdisplaysend = "alt + shift - n"
window_snap = "alt - x"

window_virtual_north = "alt - u"
window_virtual_south = "alt - i"
window_virtualmove_north = "alt + shift - u"
window_virtualmove_south = "alt + shift - i"

quit = "ctrl + alt - q"

